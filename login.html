<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Management System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/login-toast.css">
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="text-center mb-4">
                <h1 class="h1">Clothing Management</h1>
                <p class="login-subtitle">Order Management System</p>
            </div>
            
            <form id="loginForm" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required 
                           placeholder="Enter your email">
                </div>

                <div class="mb-4 position-relative">
                    <label for="password" class="form-label">Password</label>
                
                    <input 
                        type="password" 
                        class="form-control pe-5" 
                        id="password" 
                        name="password" 
                        required
                        placeholder="Enter your password"
                    >
                
                    <i 
                        class="bi bi-eye toggle-password"
                        id="togglePassword"
                    ></i>
                </div>

                <button type="submit" class="btn-login">Login</button>
                <div class="text-center mt-3">
    <a href="#" id="forgotPasswordLink" style="color: #666; font-size: 0.9rem;">
        Forgot Password?
    </a>
</div>
            </form>
        </div>
    </div>

    <div id="forgotModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:10px; width:100%; max-width:420px; margin:20px;">
            <h4 style="margin-bottom:5px;">Forgot Password</h4>
            <p style="color:#666; font-size:0.85rem; margin-bottom:20px;">
                Ilagay ang iyong email at bagong password. <br>
                <strong>Hihintayin ang approval ng Admin.</strong>
            </p>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="resetEmail" placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" class="form-control" id="resetNewPassword" placeholder="Enter new password">
            </div>

            <div class="mb-4">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="resetConfirmPassword" placeholder="Confirm new password">
            </div>

            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button type="button" id="cancelForgotBtn" class="btn btn-secondary">Cancel</button>
                <button type="button" id="submitForgotBtn" class="btn btn-primary">Submit Request</button>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/toast.js"></script>
    <script src="JS/login.js"></script>
    <script src="JS/viewPassword.js"></script>
</body>
</html>
